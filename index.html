<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Network Troubleshooter - IT Support Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.2rem; color: #58a6ff; }
    header span { font-size: 0.8rem; color: #8b949e; }

    .container { max-width: 780px; margin: 40px auto; padding: 0 20px; }

    .intro {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 28px;
    }
    .intro h2 { color: #58a6ff; margin-bottom: 8px; font-size: 1rem; }
    .intro p { color: #8b949e; font-size: 0.88rem; line-height: 1.6; }

    .problem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .problem-btn {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .problem-btn:hover { border-color: #58a6ff; background: #1c2128; }
    .problem-btn.active { border-color: #58a6ff; background: #1c2128; }
    .problem-btn .icon { font-size: 1.6rem; margin-bottom: 8px; display: block; }
    .problem-btn .title { font-size: 0.9rem; font-weight: 600; color: #e6edf3; }
    .problem-btn .desc { font-size: 0.78rem; color: #8b949e; margin-top: 4px; }

    .step-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
      display: none;
    }
    .step-card.visible { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .step-num {
      background: #58a6ff;
      color: #0d1117;
      font-weight: 700;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .step-header h3 { font-size: 0.95rem; color: #e6edf3; }

    .step-body { font-size: 0.875rem; color: #8b949e; line-height: 1.7; }
    .step-body code {
      background: #0d1117;
      border: 1px solid #30363d;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      color: #79c0ff;
      font-size: 0.85rem;
    }
    .step-body .cmd-block {
      background: #0d1117;
      border: 1px solid #30363d;
      border-left: 3px solid #58a6ff;
      border-radius: 6px;
      padding: 12px 16px;
      margin: 10px 0;
      font-family: monospace;
      color: #79c0ff;
      font-size: 0.85rem;
    }

    .question-box {
      background: #1c2128;
      border: 1px solid #388bfd40;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    .question-box p { font-size: 0.88rem; color: #e6edf3; margin-bottom: 12px; }
    .q-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .q-btn {
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #161b22;
      color: #e6edf3;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .q-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .q-btn.yes { border-color: #3fb950; color: #3fb950; }
    .q-btn.no { border-color: #f85149; color: #f85149; }

    .resolved-box {
      background: #1c2128;
      border: 1px solid #3fb95040;
      border-radius: 8px;
      padding: 20px;
      margin-top: 16px;
      text-align: center;
      display: none;
    }
    .resolved-box.visible { display: block; }
    .resolved-box .check { font-size: 2rem; margin-bottom: 8px; }
    .resolved-box p { color: #3fb950; font-size: 0.9rem; }

    .escalate-box {
      background: #1c2128;
      border: 1px solid #f8514940;
      border-radius: 8px;
      padding: 20px;
      margin-top: 16px;
      display: none;
    }
    .escalate-box.visible { display: block; }
    .escalate-box h4 { color: #f85149; margin-bottom: 8px; font-size: 0.9rem; }
    .escalate-box p { color: #8b949e; font-size: 0.82rem; line-height: 1.6; }

    .reset-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 20px;
      display: none;
    }
    .reset-btn.visible { display: inline-block; }
    .reset-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    .tag {
      display: inline-block;
      background: #388bfd20;
      color: #58a6ff;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>🔧 Network Troubleshooter</h1>
  <span>IT Support Tool · FelipeMalpic
